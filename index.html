<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G5 Instrumentos</title>
    <link rel="icon" type="image/png" href="/brand/g5-logo.png" />
    <style>
      :root {
        color: #17211b;
        background: #f3f6f5;
        font-family: "Segoe UI", Inter, Arial, sans-serif;
      }

      html,
      body,
      #root {
        min-width: 320px;
        min-height: 100%;
        margin: 0;
      }

      body,
      #root {
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(243, 246, 245, 0.92)),
          url("/brand/g5-app-background-clean.png") top center / cover no-repeat fixed,
          #f3f6f5;
      }

      .initial-loading {
        display: grid;
        min-height: 100vh;
        place-items: start;
        padding: clamp(28px, 5vw, 84px);
        box-sizing: border-box;
      }

      .initial-loading-card {
        position: relative;
        width: min(640px, 100%);
        margin-top: clamp(96px, 17vh, 180px);
        padding: 34px 38px 32px;
        border: 1px solid rgba(25, 83, 96, 0.18);
        border-top: 4px solid #195360;
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(246, 251, 250, 0.9)),
          rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 42px rgba(25, 83, 96, 0.12);
        overflow: hidden;
      }

      .initial-loading-card::after {
        position: absolute;
        right: -42px;
        bottom: -58px;
        width: 180px;
        height: 180px;
        content: "";
        background: url("/brand/g5-logo.png") center / contain no-repeat;
        opacity: 0.045;
        pointer-events: none;
      }

      .initial-loading-brand {
        display: flex;
        gap: 18px;
        align-items: center;
        margin-bottom: 18px;
      }

      .initial-loading-brand img {
        width: 64px;
        height: 64px;
        object-fit: contain;
      }

      .initial-loading-card strong {
        display: block;
        color: #195360;
        font-size: 1.65rem;
        line-height: 1.2;
      }

      .initial-loading-card span {
        color: #607368;
        font-size: 1rem;
        line-height: 1.55;
      }

      .initial-loading-eyebrow {
        display: block;
        margin-bottom: 4px;
        color: #247565;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .initial-loading-note {
        margin: 22px 0 0;
        color: #607368;
        font-size: 0.92rem;
        line-height: 1.5;
      }

      .initial-loading-bar {
        height: 4px;
        margin-top: 24px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(25, 83, 96, 0.12);
      }

      .initial-loading-bar i {
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #195360, #0e85aa, #76b27c);
        animation: initial-loading 1.4s ease-in-out infinite;
      }

      @keyframes initial-loading {
        0% {
          transform: translateX(-110%);
        }

        100% {
          transform: translateX(260%);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="initial-loading" aria-label="Carregando o G5 Instrumentos">
        <section class="initial-loading-card">
          <div class="initial-loading-brand">
            <img src="/brand/g5-logo.png" alt="" />
            <div>
              <small class="initial-loading-eyebrow">Etapa 2</small>
              <strong>G5 Instrumentos</strong>
              <span>Preparando controle de instrumentos, equipes, equipamentos e materiais.</span>
            </div>
          </div>
          <p class="initial-loading-note">
            Conectando ao ambiente Autodesk/ACC. No primeiro acesso do dia, o serviço pode levar alguns segundos para iniciar.
          </p>
          <div class="initial-loading-bar" aria-hidden="true"><i></i></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
